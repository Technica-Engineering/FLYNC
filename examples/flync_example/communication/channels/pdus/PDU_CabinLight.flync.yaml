name: PDU_CabinLight
type: standard
length: 2
description: Cabin ambient light intensity level and operating mode.

signals:
  - bit_position: 0
    endianness: LE

    signal:
      name: CabinLightLevel
      description: Ambient cabin light intensity (0 = off, 255 = max).
      bit_length: 8
      data_type: uint8
      factor: 0.392157
      offset: 0.0
      lower_limit: 0.0
      upper_limit: 100.0
      unit: "%"
  - bit_position: 8
    endianness: LE

    signal:
      name: CabinLightMode
      description: Cabin light operating mode.
      bit_length: 2
      data_type: uint8
      value_encoding:
        type: text_table
        entries:
          - from_value: 0
            to_value: 0
            label: Disabled
          - from_value: 1
            to_value: 1
            label: Manual
          - from_value: 2
            to_value: 2
            label: Auto
          - from_value: 3
            to_value: 3
            label: Error
