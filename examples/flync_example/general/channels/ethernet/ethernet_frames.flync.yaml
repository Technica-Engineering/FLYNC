frames:

  - name: EthPowertrainFrame
    type: ethernet
    description: >-
      Ethernet frame carrying powertrain data from HPC to the backbone.
      Bundles engine status, vehicle dynamics, and transmission state
      via EthPowertrainContainer.
    length: 31
    packed_pdus:
      - pdu_ref: EthPowertrainContainer
    timing:
      cyclic_timings:
        - cycle: 0.010

  - name: EthBodyFrame
    type: ethernet
    description: >-
      Ethernet frame carrying body comfort data from ZonalPlatform1 to HPC.
      Bundles mirror positions and cabin light state via EthBodyContainer.
    length: 14
    packed_pdus:
      - pdu_ref: EthBodyContainer
    timing:
      cyclic_timings:
        - cycle: 0.020

